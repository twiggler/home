name: Sync CV from Google Docs

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:        # allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch Google Doc as HTML
        run: |
          curl -fsSL \
            "https://docs.google.com/document/d/1WmBpj9NsFSwFfTtkKLUIlDCOaudItPhyOD2GfDmb7Lg/export?format=html" \
            -o /tmp/cv.html

      - name: Parse work experience
        run: python3 scripts/parse_cv.py /tmp/cv.html cv-data.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet cv-data.json; then
            git add cv-data.json
            git commit -m "chore: sync CV data from Google Docs"
            git push
          else
            echo "cv-data.json is up to date, nothing to commit."
          fi
