<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homepage of Twiggler</title>
  <style>
    :root {
      --accent: #2b6cb0;
      --text: #1a202c;
      --muted: #4a5568;
      --bg: #f7fafc;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
    }

    header {
      text-align: center;
      padding: 3rem 1rem 2rem;
    }

    .avatar {
      width: 100%;
      max-width: 480px;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      border: 4px solid #fff;
    }

    h1 {
      margin: 1.5rem 0 0.5rem;
      font-size: 1.9rem;
    }

    p.tagline {
      color: var(--muted);
      margin: 0;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1rem 4rem;
    }

    .cv-section {
      margin-top: 2rem;
    }

    .cv-actions {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .btn {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      padding: 0.7rem 1.5rem;
      border-radius: 6px;
      font-weight: 600;
      transition: background 0.2s ease;
    }

    .btn:hover { background: #21568f; }

    .cv-embed {
      position: relative;
      width: 100%;
      /* A4-ish aspect ratio for the document preview */
      padding-top: 129%;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
    }

    .cv-embed iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 1.5rem;
    }
  </style>
</head>
<body>
  <header>
    <img class="avatar" src="profile.jpg" alt="Photo of Twiggler" />
    <h1>This is the homepage of Twiggler</h1>
    <p class="tagline">Welcome &mdash; here is what I look like and what I do.</p>
  </header>

  <main>
    <section class="cv-section">
      <div class="cv-actions">
        <a class="btn"
           href="https://docs.google.com/document/d/1WmBpj9NsFSwFfTtkKLUIlDCOaudItPhyOD2GfDmb7Lg/edit"
           target="_blank" rel="noopener noreferrer">
          Open my CV in a new tab
        </a>
      </div>
      <div class="cv-embed">
        <iframe
          src="https://docs.google.com/document/d/1WmBpj9NsFSwFfTtkKLUIlDCOaudItPhyOD2GfDmb7Lg/preview"
          title="CV of Twiggler"
          loading="lazy"></iframe>
      </div>
    </section>
  </main>

  <footer>
    &copy; <span id="year"></span> Twiggler
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
