<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Twiggler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=News+Cycle:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #000; }

    /* ── Shared header ── */
    .site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      background: rgba(0,0,0,0.92);
      border-bottom: 1px solid rgba(255,232,31,0.25);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0 1.5rem;
      z-index: 100;
    }
    .site-header img {
      height: 38px;
      width: 56px;
      object-fit: cover;
      object-position: center 20%;
      border-radius: 5px;
      flex-shrink: 0;
    }
    .site-name {
      color: #FFE81F;
      font-family: 'News Cycle', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      flex: 1;
    }
    .site-nav { display: flex; gap: 0.25rem; }
    .site-nav a {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-family: 'News Cycle', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      padding: 0.35rem 0.75rem;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .site-nav a:hover, .site-nav a.active {
      color: #FFE81F;
      background: rgba(255,232,31,0.08);
    }
    .site-nav svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── Starfield canvas (drawn once, no loop) ── */
    #stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Crawl scene ── */
    .crawl-scene {
      position: fixed;
      top: 60px; left: 0; right: 0; bottom: 0;
      overflow: hidden;
      perspective: 300px;
      z-index: 1;
    }

    /* Soft fade at the top so text dissolves into space */
    .crawl-fade {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 28%;
      background: linear-gradient(to bottom, #000 0%, transparent 100%);
      z-index: 10;
      pointer-events: none;
    }

    /* Tilted plane — rotates the whole surface back from the bottom edge */
    .crawl-tilt {
      position: absolute;
      inset: 0;
      transform-origin: 50% 100%;
      transform: rotateX(25deg);
    }

    /* Scrolling text block — sits below the tilt container and animates up */
    .crawl-scroll {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      width: min(82%, 860px);
      color: #FFE81F;
      font-family: 'News Cycle', sans-serif;
      text-align: justify;
      padding-bottom: 40vh;
    }
    .crawl-scroll.running {
      animation: crawlUp var(--crawl-dur, 90s) linear infinite;
      will-change: transform;
    }

    @keyframes crawlUp {
      from { transform: translateX(-50%) translateY(0); }
      to   { transform: translateX(-50%) translateY(var(--crawl-end, -4000px)); }
    }

    /* ── Episode typography ── */
    .ep-intro {
      text-align: center;
      font-style: italic;
      font-size: 1.8rem;
      line-height: 2.2;
      margin-bottom: 4rem;
      opacity: 0.7;
    }
    .episode { margin-top: 4rem; }
    .ep-divider {
      border: none;
      border-top: 1px solid rgba(255,232,31,0.2);
      width: 45%;
      margin: 0 auto 2.2rem;
    }
    .ep-num {
      text-align: center;
      font-size: 1.3rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      opacity: 0.55;
      margin-bottom: 0.55rem;
    }
    .ep-company {
      text-align: center;
      font-size: 2.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      line-height: 1.2;
      margin-bottom: 0.4rem;
    }
    .ep-details {
      text-align: center;
      font-size: 1.05rem;
      opacity: 0.6;
      margin-bottom: 2rem;
    }
    .ep-bullet {
      font-size: 1.65rem;
      line-height: 1.85;
      margin-bottom: 1.1rem;
    }
    .ep-bullet::before { content: ''; }

    /* ── Click-to-start overlay ── */
    #start-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      cursor: pointer;
      user-select: none;
    }
    #start-overlay p {
      color: #FFE81F;
      font-family: 'News Cycle', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }
    #laser-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    #laser-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* ── Mobile: scale fonts back down ── */
    @media (max-width: 600px) {
      .ep-intro   { font-size: 1rem; }
      .ep-num     { font-size: 0.8rem; }
      .ep-company { font-size: 1.5rem; }
      .ep-details { font-size: 0.8rem; }
      .ep-bullet  { font-size: 1rem; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <img src="profile.jpg" alt="Photo of Twiggler">
  <span class="site-name">Twiggler</span>
  <nav class="site-nav">
    <a href="index.html" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Home
    </a>
    <a href="cv.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
      CV
    </a>
  </nav>
</header>

<audio id="music" loop src="Departure_from_Proxima.mp3"></audio>

<div id="start-overlay" role="button" aria-label="Click to begin">
  <canvas id="laser-canvas"></canvas>
  <p>Click anywhere to begin</p>
</div>

<canvas id="stars"></canvas>

<div class="crawl-scene">
  <div class="crawl-fade"></div>
  <div class="crawl-tilt">
    <div class="crawl-scroll" id="crawl-scroll">
      <div class="ep-intro">
        <p>A long time ago,</p>
        <p>in a career far, far away&hellip;</p>
      </div>
    </div>
  </div>
</div>

<script>
/* ── Starfield: draw once at load, never again ── */
(function () {
  var c = document.getElementById('stars');
  var ctx = c.getContext('2d');
  c.width  = window.innerWidth;
  c.height = window.innerHeight;
  for (var i = 0; i < 220; i++) {
    var x = Math.random() * c.width;
    var y = Math.random() * c.height;
    var r = Math.random() * 1.3 + 0.15;
    var a = (Math.random() * 0.55 + 0.4).toFixed(2);
    ctx.beginPath();
    ctx.arc(x, y, r, 0, 6.2832);
    ctx.fillStyle = 'rgba(255,255,255,' + a + ')';
    ctx.fill();
  }
}());

/* ── Crawl: fetch data, build HTML, start CSS animation (runs once) ── */
(async function () {
  var scroll = document.getElementById('crawl-scroll');

  var data = [];
  try {
    var res = await fetch('cv-data.json');
    if (res.ok) data = await res.json();
  } catch (_) {}

  if (!Array.isArray(data) || data.length === 0) {
    data = [{
      company: 'Data Not Yet Available',
      details: [],
      bullets: ['Trigger the GitHub Action to sync your CV from Google Docs.']
    }];
  }

  var ROMAN = ['I','II','III','IV','V','VI','VII','VIII','IX','X',
               'XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX'];

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  var html = data.map(function (item, i) {
    var bullets = (item.bullets || [])
      .map(function (b) { return '<p class="ep-bullet">' + esc(b) + '</p>'; })
      .join('\n');
    var details = (item.details || []).filter(Boolean).join(' \u00B7 ');
    return [
      '<div class="episode">',
      '  <hr class="ep-divider">',
      '  <p class="ep-num">Episode ' + (ROMAN[i] || String(i + 1)) + '</p>',
      '  <p class="ep-company">' + esc(item.company) + '</p>',
      details ? '  <p class="ep-details">' + esc(details) + '</p>' : '',
      bullets,
      '</div>'
    ].filter(Boolean).join('\n');
  }).join('\n');

  scroll.insertAdjacentHTML('beforeend', html);

  /* Set animation parameters after DOM is updated */
  requestAnimationFrame(function () {
    var tiltEl  = scroll.parentElement;          /* .crawl-tilt */
    var tiltH   = tiltEl.offsetHeight;
    var contentH = scroll.scrollHeight;
    var end      = -(tiltH + contentH + 100);    /* px to scroll before loop */
    var totalDist = Math.abs(end);
    var speed    = 50;                            /* px / second */
    var dur      = Math.round(totalDist / speed);

    scroll.style.setProperty('--crawl-end', end + 'px');
    scroll.style.setProperty('--crawl-dur', dur + 's');

    var overlay = document.getElementById('start-overlay');
    var lc      = document.getElementById('laser-canvas');
    var music   = document.getElementById('music');
    var fired   = false;

    function playTieSound() {
      try {
        var ac = new (window.AudioContext || window.webkitAudioContext)();
        [820, 900].forEach(function (freq) {
          var osc = ac.createOscillator();
          var gain = ac.createGain();
          var shaper = ac.createWaveShaper();
          var n = 256, curve = new Float32Array(n);
          for (var i = 0; i < n; i++) {
            var x = i * 2 / n - 1;
            curve[i] = (Math.PI + 180) * x / (Math.PI + 180 * Math.abs(x));
          }
          shaper.curve = curve;
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(freq, ac.currentTime);
          osc.frequency.exponentialRampToValueAtTime(freq * 0.17, ac.currentTime + 0.42);
          gain.gain.setValueAtTime(0.45, ac.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.48);
          osc.connect(shaper); shaper.connect(gain); gain.connect(ac.destination);
          osc.start(); osc.stop(ac.currentTime + 0.5);
        });
      } catch (e) {}
    }

    function fireLasers(tx, ty, done) {
      lc.width  = window.innerWidth;
      lc.height = window.innerHeight;
      var ctx = lc.getContext('2d');
      /* Twin cannon sources: top-left and top-right, like a TIE above the viewer */
      var sources = [
        { x: window.innerWidth * 0.08, y: -20 },
        { x: window.innerWidth * 0.92, y: -20 }
      ];
      var t0 = null, dur = 520;
      function frame(ts) {
        if (!t0) t0 = ts;
        var p = Math.min(1, (ts - t0) / dur);
        /* Hold full brightness until 60%, then fade out */
        var alpha = p < 0.6 ? 1 : 1 - (p - 0.6) / 0.4;
        ctx.clearRect(0, 0, lc.width, lc.height);
        sources.forEach(function (src) {
          /* Outer glow */
          ctx.save();
          ctx.globalAlpha = alpha * 0.45;
          ctx.shadowBlur  = 28;
          ctx.shadowColor = '#00FF41';
          ctx.strokeStyle = '#00FF41';
          ctx.lineWidth   = 9;
          ctx.beginPath(); ctx.moveTo(src.x, src.y); ctx.lineTo(tx, ty); ctx.stroke();
          /* Bright white core */
          ctx.globalAlpha = alpha;
          ctx.shadowBlur  = 5;
          ctx.shadowColor = '#CCFFCC';
          ctx.strokeStyle = '#DFFFDF';
          ctx.lineWidth   = 2.5;
          ctx.beginPath(); ctx.moveTo(src.x, src.y); ctx.lineTo(tx, ty); ctx.stroke();
          ctx.restore();
        });
        if (p < 1) { requestAnimationFrame(frame); }
        else { ctx.clearRect(0, 0, lc.width, lc.height); done(); }
      }
      playTieSound();
      requestAnimationFrame(frame);
    }

    function begin(e) {
      if (fired) return;
      fired = true;
      var x = (e && e.clientX != null) ? e.clientX : window.innerWidth  / 2;
      var y = (e && e.clientY != null) ? e.clientY : window.innerHeight / 2;
      fireLasers(x, y, function () {
        overlay.remove();
        music.play().catch(function () {});
        scroll.classList.add('running');
      });
    }
    overlay.addEventListener('click', begin);
    document.addEventListener('keydown', begin, { once: true });
  });
}());
</script>
</body>
</html>
